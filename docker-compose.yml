version: "3.9"

services:
  db:
    image: postgres:16
    container_name: scholarship_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholar_scout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    container_name: scholarship_api
    working_dir: /app
    command: sh -c "pip install -r requirements.txt ; alembic upgrade head ; uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    environment:
      APP_NAME: Scholarship Scout Bot
      ENVIRONMENT: dev
      VERSION: 1.0.0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/scholar_scout
    ports:
      - "8000:8000"
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  db_data:
